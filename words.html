<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Vocabulary Quiz</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .container { max-width: 600px; margin: auto; padding: 20px; }\n        .word { font-size: 24px; margin: 20px 0; }\n        .result { color: green; }\n        button { padding: 10px 15px; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Vocabulary Quiz</h1>\n        <div class="word">Word: <span id="word"></span></div>\n        <input type="text" id="input" placeholder="Type the meaning...">\n        <button id="submit">Submit</button>\n        <div class="result" id="result"></div>\n        <button id="next">Next</button>\n        <button id="reset">Reset</button>\n    </div>\n    <script>\n        const words = [ { word: 'rare', meaning: '珍しい' }, { word: 'unique', meaning: '唯一の' }, { word: 'abundant', meaning: '豊富な' } ];\n        let currentIndex = 0;\n        let progress = JSON.parse(localStorage.getItem('progress')) || {};\n        const wordElement = document.getElementById('word');\n        const inputElement = document.getElementById('input');\n        const resultElement = document.getElementById('result');\n        const submitButton = document.getElementById('submit');\n        const nextButton = document.getElementById('next');\n        const resetButton = document.getElementById('reset');\n        function loadWord() {\n            if (progress[currentIndex] !== undefined) {\n                wordElement.textContent = words[currentIndex].word;\n                inputElement.value = '';\n                resultElement.textContent = '';\n            } else {\n                wordElement.textContent = 'Quiz Completed!';\n                submitButton.style.display = 'none';\n                nextButton.style.display = 'none';\n            }\n        }\n        submitButton.addEventListener('click', () => {\n            const answer = inputElement.value.trim();\n            if (answer === words[currentIndex].meaning) {\n                resultElement.textContent = 'Correct!';\n                progress[currentIndex] = true;\n                localStorage.setItem('progress', JSON.stringify(progress));\n            } else {\n                resultElement.textContent = 'Wrong! The correct answer is: ' + words[currentIndex].meaning;\n            }\n        });\n        nextButton.addEventListener('click', () => {\n            currentIndex++;\n            loadWord();\n        });\n        resetButton.addEventListener('click', () => {\n            progress = {};\n            localStorage.removeItem('progress');\n            currentIndex = 0;\n            loadWord();\n            submitButton.style.display = 'inline';\n            nextButton.style.display = 'inline';\n        });\n        loadWord();\n    <\/script>\n</body>\n</html>
