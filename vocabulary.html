<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Questions</title>
    <script>
        // Function to implement the delay for re-asking incorrect problems
        function askQuestion(question, callback) {
            const isCorrect = confirm(question);
            if (!isCorrect) {
                const delay = Math.floor(Math.random() * (5 - 3 + 1)) + 3; // Delay between 3 to 5 seconds
                console.log(`Incorrect. Please wait ${delay} seconds before re-asking.`);
                setTimeout(() => {
                    callback();
                }, delay * 1000);
            } else {
                console.log("Correct!");
            }
        }

        // Example usage
        window.onload = function() {
            askQuestion("Is 'apple' a fruit?", function() {
                askQuestion("Is 'carrot' a fruit?", arguments.callee);
            });
        };
    </script>
</head>
<body>
    <h1>Welcome to the Vocabulary Quiz</h1>
    <p>Answer the questions when prompted.</p>
</body>
</html>
