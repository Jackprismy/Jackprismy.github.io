        let currentWordIndex = 0;

        function displayWord() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = `<h2>${words[currentWordIndex].word}</h2>`;
        }

        document.getElementById('reveal-meaning').addEventListener('click', function() {
            alert(`Meaning: ${words[currentWordIndex].meaning}`);
        });

            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                alert('Quiz Completed!');
                currentWordIndex = 0;
            }
            displayWord();
        });

        document.getElementById('incorrect').addEventListener('click', function() {
            mistakes.push(words[currentWordIndex]);
            localStorage.setItem('mistakes', JSON.stringify(mistakes));
            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                alert('Quiz Completed!');
                currentWordIndex = 0;
            }
            displayWord();
        });
