<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .quiz-container { max-width: 600px; margin: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>Vocabulary Quiz</h1>
        <div id="questions"></div>
        <button id="submit" class="hidden">Submit</button>
        <button id="reset">Reset Progress</button>
    </div>
    <script>
        const questions = [
            { question: "What is the synonym of 'happy'?", options: ['sad', 'joyful', 'angry'], answer: 1 },
            { question: "What does 'ubiquitous' mean?", options: ['rare', 'everywhere', 'difficult'], answer: 1 },
            { question: "What is the antonym of 'diligent'?", options: ['lazy', 'hardworking', 'smart'], answer: 0 }
        ];
        let currentQuestionIndex = 0;
        let score = 0;

        function loadQuestion() {
            const questionElement = document.getElementById('questions');
            questionElement.innerHTML = '';
            const currentQuestion = questions[currentQuestionIndex];
            const questionText = `<h2>${currentQuestion.question}</h2>`;
            questionElement.insertAdjacentHTML('beforeend', questionText);
            currentQuestion.options.forEach((option, index) => {
                questionElement.insertAdjacentHTML('beforeend', `<button onclick="checkAnswer(${index})">${option}</button>`);
            });
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === questions[currentQuestionIndex].answer) {
                score++;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const questionElement = document.getElementById('questions');
            questionElement.innerHTML = `You scored ${score} out of ${questions.length}`;
            localStorage.setItem('quizScore', score);
            document.getElementById('submit').classList.remove('hidden');
        }

        document.getElementById('reset').addEventListener('click', () => {
            localStorage.removeItem('quizScore');
            score = 0;
            currentQuestionIndex = 0;
            loadQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
