<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語帳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .progress {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .word-display {
            margin: 40px 0;
        }

        .word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .meaning {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            min-height: 60px;
            display: none;
            margin-bottom: 20px;
        }

        .meaning.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
        }

        .btn-secondary {
            background: #9E9E9E;
            color: white;
            font-size: 12px;
            padding: 8px 12px;
            min-width: auto;
        }

        .btn-secondary:hover {
            background: #757575;
        }

        .hidden {
            display: none;
        }

        .admin-panel {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .admin-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .completion-message {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin: 40px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .mistake-list {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            display: none;
        }

        .mistake-list.show {
            display: block;
        }

        .mistake-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
        }

        .mistake-count {
            font-size: 14px;
            color: #856404;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .word {
                font-size: 36px;
            }

            button {
                padding: 10px 18px;
                font-size: 14px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">英単語帳</div>
            <div class="progress">
                <span id="progressText">0 / 0</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div id="mainContent">
            <div class="word-display">
                <div class="word" id="wordDisplay"></div>
                <div class="meaning" id="meaningDisplay"></div>
                <div class="mistake-list" id="mistakeListInfo">
                    <div class="mistake-title">苦手な単語</div>
                    <div class="mistake-count" id="mistakeCount"></div>
                </div>
            </div>

            <div class="button-group">
                <button id="showMeaningBtn" class="btn-primary" onclick="showMeaning()">意味を見る</button>
                <button class="btn-secondary" onclick="speakWord()">▶ 再生</button>
            </div>

            <div class="button-group hidden" id="resultButtons">
                <button id="correctBtn" class="btn-success" onclick="markCorrect()">できた</button>
                <button id="incorrectBtn" class="btn-danger" onclick="markIncorrect()">できなかった</button>
            </div>
        </div>

        <div id="completionContent" class="hidden">
            <div class="completion-message">🎉 すべての問題を完了しました！</div>
            <button id="restartBtn" class="btn-primary" onclick="restart()">もう一度</button>
        </div>

        <div class="admin-panel">
            <div class="admin-title">管理</div>
            <div class="button-group">
                <button class="btn-secondary" onclick="clearLocalStorage()">ストレージをリセット</button>
            </div>
        </div>
    </div>

    <script>
        // 単語データ
        const vocabulary = [
   { word: "contribute", meaning: "貢献する" },
  { word: "abolish O", meaning: "○を廃止する" },
  { word: "impose A on B", meaning: "AをBに押しつける" },
  { word: "access", meaning: "利用する権利" },
  { word: "duty", meaning: "義務" },
  { word: "responsible", meaning: "責任がある" },
  { word: "policy", meaning: "政策" },
  { word: "elect O", meaning: "○を選ぶ" },
  { word: "industry", meaning: "工業" },
  { word: "income", meaning: "収入" },
  { word: "profit", meaning: "利益" },
  { word: "tax", meaning: "税金" },
  { word: "expense", meaning: "費用" },
  { word: "debt", meaning: "借金" },
  { word: "deposit", meaning: "預金" },
  { word: "charge", meaning: "料金" },
  { word: "wage", meaning: "賃金" },
  { word: "recession", meaning: "不景気" },
  { word: "consume O", meaning: "○を消費する" },
  { word: "waste O", meaning: "○をむだにする(お金や時間)" },
  { word: "invest O", meaning: "○を投資する" },
  { word: "import O", meaning: "○を輸入する" },
  { word: "financial", meaning: "財政的な" },
  { word: "hire O", meaning: "○を雇う(短期間)" },
  { word: "employ O", meaning: "○を雇う(長期間)" },
  { word: "resign", meaning: "辞職する" },
  { word: "qualify O", meaning: "○に資格を与える" },
  { word: "assign O", meaning: "○を割り当てる(仕事など)" },
  { word: "occupation", meaning: "職業" },
  { word: "career", meaning: "職業" },
  { word: "profession", meaning: "職業" },
  { word: "unemployment", meaning: "失業" },
  { word: "document", meaning: "書類" },
  { word: "department", meaning: "部門" },
  { word: "branch", meaning: "支店" },
  { word: "retail", meaning: "小売り" },
  { word: "colleague", meaning: "同僚" },
  { word: "system", meaning: "組織" },
  { word: "structure", meaning: "構造" },
  { word: "architecture", meaning: "建築" },
  { word: "construction", meaning: "建設" },
  { word: "function", meaning: "機能" },
  { word: "surface", meaning: "表面" },
  { word: "aspect", meaning: "側面" },
  { word: "edge", meaning: "端" },
  { word: "makeup", meaning: "構成" },
  { word: "consist of O", meaning: "○から構成されている" },
  { word: "compose O", meaning: "○を組み立てる" },
  { word: "attach A to B", meaning: "AをBにくっつける" },
  { word: "connect A with B", meaning: "AをBと関連づける" },
  { word: "relate A to B", meaning: "AをBと関連づける" },
  { word: "associate A with B", meaning: "AをBと関連づける" },
  { word: "stick to O", meaning: "○に固執する(考えなどが)" },
  { word: "thief", meaning: "泥棒" },
  { word: "crime", meaning: "犯罪" },
  { word: "motive", meaning: "動機" },
  { word: "punish O", meaning: "○を罰する" },
  { word: "violate O", meaning: "○に違反する(法律など)" },
  { word: "legal", meaning: "合法の" },
  { word: "enemy", meaning: "敵" },
  { word: "conflict", meaning: "対立" },
  { word: "compete", meaning: "競う" },
  { word: "defeat O", meaning: "○を倒す(勝負などで)" },
  { word: "victim", meaning: "犠牲者" },
  { word: "obstacle", meaning: "障害" },
  { word: "harm", meaning: "害" },
  { word: "invade O", meaning: "○を侵略する" },
  { word: "endanger O", meaning: "○を危険にさらす" },
  { word: "interrupt O", meaning: "○を邪魔して中断させる" },
  { word: "spoil O", meaning: "○を台無しにする(価値をなくさせる)" },
  { word: "spectator", meaning: "観客" },
  { word: "relative", meaning: "親戚" },
  { word: "departure", meaning: "出発" },
  { word: "destination", meaning: "目的地" },
  { word: "transportation", meaning: "交通機関" },
  { word: "vehicle", meaning: "車両" },
  { word: "baggage", meaning: "荷物(不可算扱い)" },
  { word: "via X", meaning: "X経由で" },
  { word: "lead to O", meaning: "○(という結果)に至る" },
  { word: "rise", meaning: "上がる" },
  { word: "flow", meaning: "流れる" },
  { word: "burst", meaning: "破裂する" },
  { word: "melt", meaning: "溶ける" },
  { word: "commute", meaning: "通勤する" },
  { word: "accompany O", meaning: "○を引き連れる" },
  { word: "emit O", meaning: "○を排出する(ガスや熱など)" },
  { word: "progress", meaning: "進歩" },
  { word: "advance", meaning: "進歩" },
  { word: "deal with O", meaning: "○に対処する" },
  { word: "handle O", meaning: "○を扱う" },
  { word: "treat O", meaning: "○を扱う" },
  { word: "clue", meaning: "手がかり" },
  { word: "restrict O", meaning: "○を制限する" },
  { word: "limit O", meaning: "○を制限する" },
  { word: "forbid O", meaning: "○を禁止する" },
  { word: "ban O", meaning: "○を禁止する" },
  { word: "refuse O", meaning: "○を断る" },
  { word: "reject O", meaning: "○を拒絶する" },
  { word: "persuade O to V", meaning: "OがVするように説得する" },
  { word: "convince A of B", meaning: "AにBを納得させる" },
  { word: "inspire O", meaning: "○のやる気を上げる" },
  { word: "discourage O", meaning: "○のやる気をなくさせる" },
  { word: "promote O", meaning: "○を昇進させる" },
  { word: "boost O", meaning: "○を増大させる" },


      
        ];

        let allWords = [];
        let mistakeWords = [];
        let currentIndex = 0;
        let showingMistakes = false;
        let previousWordCount = 0;

        // ローカルストレージのキー
        const STORAGE_KEYS = {
            allWords: 'vocabAllWords',
            mistakeWords: 'vocabMistakeWords',
            currentIndex: 'vocabCurrentIndex',
            showingMistakes: 'vocabShowingMistakes',
            wordCount: 'vocabWordCount'
        };

        // 初期化
        function init() {
            loadFromStorage();
            
            // 単語数が増えた場合、ストレージをリセット
            if (vocabulary.length > previousWordCount) {
                clearLocalStorage();
                previousWordCount = vocabulary.length;
            }

            if (allWords.length === 0) {
                initializeWords();
            }

            displayWord();
        }

        // 単語データの初期化
        function initializeWords() {
            allWords = [...vocabulary];
            mistakeWords = [];
            currentIndex = 0;
            showingMistakes = false;
            previousWordCount = vocabulary.length;
            saveToStorage();
        }

        // 配列をシャッフル
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 単語を表示
        function displayWord() {
            const mainContent = document.getElementById('mainContent');
            const completionContent = document.getElementById('completionContent');

            if (allWords.length === 0 && mistakeWords.length === 0) {
                mainContent.classList.add('hidden');
                completionContent.classList.remove('hidden');
                return;
            }

            mainContent.classList.remove('hidden');
            completionContent.classList.add('hidden');

            const currentList = showingMistakes ? mistakeWords : allWords;
            const current = currentList[currentIndex];

            document.getElementById('wordDisplay').textContent = current.word;
            document.getElementById('meaningDisplay').textContent = current.meaning;
            document.getElementById('meaningDisplay').classList.remove('show');
            document.getElementById('showMeaningBtn').classList.remove('hidden');
            document.getElementById('resultButtons').classList.add('hidden');

            updateProgress();
            updateMistakeInfo();
        }

        // 意味を表示
        function showMeaning() {
            document.getElementById('meaningDisplay').classList.add('show');
            document.getElementById('showMeaningBtn').classList.add('hidden');
            document.getElementById('resultButtons').classList.remove('hidden');
        }
        
        // 英単語を読み上げる
        function speakWord() {
             const currentList = showingMistakes ? mistakeWords : allWords;
             const current = currentList[currentIndex];

            const utterance = new SpeechSynthesisUtterance(current.word);
            utterance.lang = 'en-US';   // 英語
            utterance.rate = 0.9;       // 少しゆっくり
            utterance.pitch = 1.0;      // 声の高さ
            utterance.volume = 1.0;     // 音量
        
            speechSynthesis.cancel();   // 前の読み上げ停止
            speechSynthesis.speak(utterance);
         }

        // 正解をマーク
        function markCorrect() {
            if (showingMistakes) {
                mistakeWords.splice(currentIndex, 1);
                if (mistakeWords.length === 0) {
                    allWords = [];
                    showingMistakes = false;
                    currentIndex = 0;
                } else {
                    if (currentIndex >= mistakeWords.length) {
                        currentIndex = mistakeWords.length - 1;
                    }
                }
            } else {
                if (currentIndex < allWords.length - 1) {
                    currentIndex++;
                } else {
                    // すべての単語が終了した場合
                    if (mistakeWords.length > 0) {
                        allWords = [];
                        showingMistakes = true;
                        currentIndex = 0;
                    } else {
                        allWords = [];
                        saveToStorage();
                        displayWord();
                        return;
                    }
                }
            }
            saveToStorage();
            displayWord();
        }

        // 不正解をマーク
        function markIncorrect() {
            const currentList = showingMistakes ? mistakeWords : allWords;
            const current = currentList[currentIndex];

            // すでにmistakeWordsにあるかチェック
            const exists = mistakeWords.some(w => w.word === current.word && w.meaning === current.meaning);
            if (!exists) {
                mistakeWords.push(current);
            }

            if (showingMistakes) {
                if (currentIndex < mistakeWords.length - 1) {
                    currentIndex++;
                } else {
                    if (mistakeWords.length > 0) {
                        allWords = [];
                        showingMistakes = true;
                        currentIndex = 0;
                    } else {
                        allWords = [];
                        saveToStorage();
                        displayWord();
                        return;
                    }
                }
            } else {
                // 3～5問後に再出題するため、次の問題を進める
                const currentList = showingMistakes ? mistakeWords : allWords;
                if (currentIndex < currentList.length - 1) {
                    currentIndex++;
                } else {
                    // すべての単語が終了した場合
                    if (mistakeWords.length > 0) {
                        allWords = [];
                        showingMistakes = true;
                        currentIndex = 0;
                    } else {
                        allWords = [];
                        saveToStorage();
                        displayWord();
                        return;
                    }
                }
            }
            saveToStorage();
            displayWord();
        }

        // 進捗を更新
        function updateProgress() {
            const currentList = showingMistakes ? mistakeWords : allWords;
            const total = showingMistakes ? mistakeWords.length : vocabulary.length;
            const current = currentIndex + 1;

            document.getElementById('progressText').textContent = `${current} / ${total}`;

            const percentage = (current / total) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        // 苦手な単語情報を更新
        function updateMistakeInfo() {
            if (mistakeWords.length > 0) {
                document.getElementById('mistakeListInfo').classList.add('show');
                document.getElementById('mistakeCount').textContent = `苦手な単語: ${mistakeWords.length}個`;
            } else {
                document.getElementById('mistakeListInfo').classList.remove('show');
            }
        }

        // ローカルストレージに保存
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEYS.allWords, JSON.stringify(allWords));
            localStorage.setItem(STORAGE_KEYS.mistakeWords, JSON.stringify(mistakeWords));
            localStorage.setItem(STORAGE_KEYS.currentIndex, JSON.stringify(currentIndex));
            localStorage.setItem(STORAGE_KEYS.showingMistakes, JSON.stringify(showingMistakes));
            localStorage.setItem(STORAGE_KEYS.wordCount, JSON.stringify(vocabulary.length));
        }

        // ローカルストレージから読み込み
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEYS.allWords);
            if (stored) {
                allWords = JSON.parse(stored);
                mistakeWords = JSON.parse(localStorage.getItem(STORAGE_KEYS.mistakeWords) || '[]');
                currentIndex = JSON.parse(localStorage.getItem(STORAGE_KEYS.currentIndex) || '0');
                showingMistakes = JSON.parse(localStorage.getItem(STORAGE_KEYS.showingMistakes) || 'false');
                previousWordCount = JSON.parse(localStorage.getItem(STORAGE_KEYS.wordCount) || '0');
            }
        }

        // ストレージをクリア
        function clearLocalStorage() {
            localStorage.removeItem(STORAGE_KEYS.allWords);
            localStorage.removeItem(STORAGE_KEYS.mistakeWords);
            localStorage.removeItem(STORAGE_KEYS.currentIndex);
            localStorage.removeItem(STORAGE_KEYS.showingMistakes);
            localStorage.removeItem(STORAGE_KEYS.wordCount);
            initializeWords();
            displayWord();
            alert('ストレージをリセットしました');
        }

        // リスタート
        function restart() {
            initializeWords();
            displayWord();
        }

        // ページロード時に初期化
        window.addEventListener('load', init);
    </script>
</body>
</html>
