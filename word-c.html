<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; }
        button { margin: 5px; }
    </style>
</head>
<body>
    <h1>Vocabulary Quiz</h1>
    <div id="quiz-container"></div>
    <button id="reveal-meaning">Reveal Meaning</button>
    <button id="correct">Correct</button>
    <button id="incorrect">Incorrect</button>
    <button id="reset">Reset Quiz</button>

    <script>
        const words = [
            { word: "rare", meaning: "珍しい" },
            { word: "simple", meaning: "シンプルな" },
            { word: "peaceful", meaning: "平和な" },
            { word: "curious", meaning: "好奇心の強い" },
            { word: "beautiful", meaning: "美しい" },
            { word: "brave", meaning: "勇敢な" },
            { word: "joyful", meaning: "喜ばしい" },
            { word: "delicious", meaning: "美味しい" },
            { word: "mysterious", meaning: "神秘的な" },
            { word: "healthful", meaning: "健康に良い" },
            { word: "generous", meaning: "気前の良い" },
            { word: "wonderful", meaning: "素晴らしい" }
        ];

        let currentWordIndex = 0;
        let mistakes = JSON.parse(localStorage.getItem('mistakes')) || [];

        function displayWord() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = `<h2>${words[currentWordIndex].word}</h2>`;
        }

        document.getElementById('reveal-meaning').addEventListener('click', function() {
            alert(`Meaning: ${words[currentWordIndex].meaning}`);
        });

        document.getElementById('correct').addEventListener('click', function() {
            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                alert('Quiz Completed!');
                currentWordIndex = 0;
            }
            displayWord();
        });

        document.getElementById('incorrect').addEventListener('click', function() {
            mistakes.push(words[currentWordIndex]);
            localStorage.setItem('mistakes', JSON.stringify(mistakes));
            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                alert('Quiz Completed!');
                currentWordIndex = 0;
            }
            displayWord();
        });

        document.getElementById('reset').addEventListener('click', function() {
            currentWordIndex = 0;
            mistakes = [];
            localStorage.removeItem('mistakes');
            displayWord();
        });

        // Display the first word
        displayWord();
    </script>
</body>
</html>
