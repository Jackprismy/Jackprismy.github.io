<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語帳アプリ</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        #word-container {
            text-align: center;
        }
        #word {
            font-size: 2em;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        #progress {
            margin-top: 20px;
            font-size: 1em;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="word-container">
        <div id="word">Loading...</div>
        <button id="show-meaning-btn">意味を見る</button>
        <p id="meaning" style="display: none;"></p>
        <button id="correct-btn" style="display: none;">できた</button>
        <button id="incorrect-btn" style="display: none;">できなかった</button>
        <button id="restart-btn" style="display: none;">最初に戻す</button>
        <p id="progress"></p>
    </div>

    <script>
        const initialWordList = [
            { word: "apple", meaning: "りんご" },
            { word: "banana", meaning: "バナナ" },
            { word: "orange", meaning: "みかん" },
            { word: "grape", meaning: "ぶどう" },
            { word: "peach", meaning: "もも" }
        ];

        const shuffledWordListKey = 'shuffledWordList';
        const missedWordsKey = 'missedWords';
        const resetKey = 'wordReset';

        // 配列シャッフル用関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 単語リストをローカルストレージに初期化
        if (!localStorage.getItem(resetKey) || localStorage.getItem(resetKey) !== JSON.stringify(initialWordList)) {
            localStorage.setItem(resetKey, JSON.stringify(initialWordList));
            localStorage.setItem(shuffledWordListKey, JSON.stringify(shuffleArray([...initialWordList])));
            localStorage.setItem(missedWordsKey, JSON.stringify([]));
        }

        const wordContainer = document.getElementById('word-container');
        const wordElement = document.getElementById('word');
        const showMeaningBtn = document.getElementById('show-meaning-btn');
        const meaningElement = document.getElementById('meaning');
        const correctBtn = document.getElementById('correct-btn');
        const incorrectBtn = document.getElementById('incorrect-btn');
        const restartBtn = document.getElementById('restart-btn');
        const progressElement = document.getElementById('progress');

        let shuffledWordList = JSON.parse(localStorage.getItem(shuffledWordListKey));
        let missedWords = JSON.parse(localStorage.getItem(missedWordsKey));
        let roundCount = 0;

        function updateLocalStorage() {
            localStorage.setItem(shuffledWordListKey, JSON.stringify(shuffledWordList));
            localStorage.setItem(missedWordsKey, JSON.stringify(missedWords));
        }

        function renderProgress() {
            progressElement.textContent = `${roundCount + 1}ラウンド目: 残り単語数: ${shuffledWordList.length}`;
        }

        function renderWord() {
            if (shuffledWordList.length === 0 && missedWords.length > 0) {
                shuffledWordList = [...missedWords];
                missedWords = [];
                roundCount += 1;
                updateLocalStorage();
                renderProgress();
            }

            if (shuffledWordList.length === 0) {
                wordElement.textContent = "全て完了しました！";
                meaningElement.style.display = "none";
                showMeaningBtn.style.display = "none";
                correctBtn.style.display = "none";
                incorrectBtn.style.display = "none";
                restartBtn.style.display = "inline";
                progressElement.textContent = "";
                return;
            }

            const currentWord = shuffledWordList[0];
            wordElement.textContent = currentWord.word;
            meaningElement.style.display = "none";
            meaningElement.textContent = currentWord.meaning;
            showMeaningBtn.style.display = "inline";
            correctBtn.style.display = "none";
            incorrectBtn.style.display = "none";
        }

        showMeaningBtn.addEventListener('click', () => {
            meaningElement.style.display = "block";
            showMeaningBtn.style.display = "none";
            correctBtn.style.display = "inline";
            incorrectBtn.style.display = "inline";
        });

        correctBtn.addEventListener('click', () => {
            shuffledWordList.shift();
            updateLocalStorage();
            renderWord();
        });

        incorrectBtn.addEventListener('click', () => {
            missedWords.push(shuffledWordList[0]);
            // 3〜5問後に出題されるように間に質問を追加
            const interval = Math.floor(Math.random() * 3) + 3;
            const missedWord = shuffledWordList.shift();
            shuffledWordList.splice(interval, 0, missedWord);
            updateLocalStorage();
            renderWord();
        });

        restartBtn.addEventListener('click', () => {
            localStorage.removeItem(resetKey);
            localStorage.removeItem(shuffledWordListKey);
            localStorage.removeItem(missedWordsKey);
            location.reload();
        });

        renderWord();
        renderProgress();
    </script>
</body>
</html>
