<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語帳アプリ</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        #word-container {
            text-align: center;
        }
        #word {
            font-size: 2em;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        #progress {
            margin-top: 20px;
            font-size: 1em;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="word-container">
        <div id="word">Loading...</div>
        <button id="show-meaning-btn">意味を見る</button>
        <p id="meaning" style="display: none;"></p>
        <button id="correct-btn" style="display: none;">できた</button>
        <button id="incorrect-btn" style="display: none;">できなかった</button>
        <button id="restart-btn" style="display: none;">最初に戻す</button>
        <p id="progress"></p>
    </div>

    <script>
        const initialWordList = [
  { word: "political", meaning: "政治的な" },
  { word: "certain", meaning: "確信している(Cとして使われると)" },
  { word: "prevent O from Ving", meaning: "OがVしないようにする" },
  { word: "deny O", meaning: "○を否定する" },
  { word: "enable O to V", meaning: "OがVできる" },
  { word: "succeed", meaning: "成功する" },
  { word: "serve O", meaning: "を出す(飲食物など)" },
  { word: "behave", meaning: "行儀よくふるまう" },
  { word: "remain C", meaning: "Cのままでいる" },
  { word: "represent O", meaning: "を代表する" },
  { word: "base A on B", meaning: "AはBに基づく" },
  { word: "contain O", meaning: "○を含む" },
  { word: "quit O", meaning: "○をやめる" },
  { word: "predict O", meaning: "○を予測する" },
  { word: "remind A of B", meaning: "AにBを思い出させる" },
  { word: "appreciate O", meaning: "○に感謝する(感謝して受け入れる感じ)" },
  { word: "accept O", meaning: "を受け入れる" },
  { word: "consider O", meaning: "をよく考える" },
  { word: "mind O", meaning: "○をいやがる" },
  { word: "compare A with B", meaning: "AをBと比較する" },
  { word: "concentrate on O", meaning: "○に集中する" },
  { word: "allow O to V", meaning: "OがVすることを許可する" },
  { word: "admit O", meaning: "○を認める" },
  { word: "sight", meaning: "光景" },
  { word: "flood", meaning: "洪水" },
  { word: "polite", meaning: "礼儀正しい" },
  { word: "rude", meaning: "無礼な" },
  { word: "lazy", meaning: "怠けた" },
  { word: "strict", meaning: "厳しい" },
  { word: "intelligent", meaning: "知的な" },
  { word: "silly", meaning: "ばかな" },
  { word: "nervous", meaning: "不安な(緊張で)" },
  { word: "attitude", meaning: "態度" },
  { word: "fault", meaning: "欠点" },
  { word: "correct", meaning: "正しい" },
  { word: "ideal", meaning: "理想的な" },
  { word: "appropriate", meaning: "適切な" },
  { word: "major", meaning: "主要な" },
  { word: "matter", meaning: "重要である" },
  { word: "lively", meaning: "生き生きとした" },
  { word: "comfortable", meaning: "快適な" },
  { word: "pleasant", meaning: "楽しい" },
  { word: "familiar", meaning: "よく知っている" },
  { word: "differ", meaning: "異なる" },
  { word: "vary", meaning: "さまざまである" },
  { word: "specific", meaning: "特定の" },
  { word: "common", meaning: "共通の" },
  { word: "unusual", meaning: "珍しい" },
  { word: "add A to B", meaning: "AをBに加える" },
  { word: "divide O", meaning: "を分割する" },
  { word: "weigh", meaning: "重さがある" },
  { word: "quarter", meaning: "4分の1" },
  { word: "lack", meaning: "不足" },
  { word: "extra", meaning: "余分な" },
  { word: "ready", meaning: "用意ができている" },
  { word: "adjust O", meaning: "○を調整する" },
  { word: "apply A to B", meaning: "AをBに当てはめる" },
  { word: "suit O", meaning: "○にピッタシ合う" },
  { word: "opportunity", meaning: "機会" },
  { word: "used to V", meaning: "以前はVしていた(今はしていない)" },
  { word: "provide A with B", meaning: "AにBを提供する" },
  { word: "furniture", meaning: "家具" },
  { word: "greet O", meaning: "○に挨拶する" },
  { word: "site", meaning: "場所(特定の目的で使われる)" },
  { word: "direction", meaning: "方向" },
  { word: "instrument", meaning: "楽器" },
  { word: "pronounce O", meaning: "を発音する" },
  { word: "sign", meaning: "兆候" },
  { word: "rely on O", meaning: "に頼る" },
  { word: "beg for O", meaning: "を必死に求める" },
  { word: "prefer A to B", meaning: "AがBより好き" },
  { word: "weep", meaning: "しくしく泣く" },
  { word: "anxious", meaning: "心配して" },
  { word: "satisfy O", meaning: "を満足させる" },
  { word: "annoy O", meaning: "○をいらいらさせる" },
  { word: "bother O", meaning: "○に面倒をかける" },
  { word: "disturb O", meaning: "○の邪魔をする" },
  { word: "frighten O", meaning: "○を怖がらせる" },
  { word: "regret O", meaning: "を後悔する" },
  { word: "favor", meaning: "親切な行為" },
  { word: "pity", meaning: "残念なこと" },
  { word: "due to X", meaning: "Xが原因で" },
  { word: "end up Ving", meaning: "最終的にVすることになる" },
  { word: "cause O", meaning: "○を引き起こす" },
  { word: "manner", meaning: "方法" },
  { word: "purpose", meaning: "目的" },
  { word: "for the sake of X", meaning: "Xのために" },
  { word: "complete", meaning: "完全な" },
  { word: "hardly", meaning: "ほとんど～ない(否定語)" },
  { word: "partly", meaning: "ある程度" },
  { word: "exactly", meaning: "正確に" },
  { word: "gradually", meaning: "徐々に" },
  { word: "therefore", meaning: "それゆえに" },
  { word: "besides X", meaning: "Xのほかに" },
  { word: "except X", meaning: "Xを除いて" },
  { word: "criticize O", meaning: "○を批判する" },
  { word: "accuse A of B", meaning: "AをBの理由で責める" },
  { word: "insist on O", meaning: "を主張する" },
  { word: "object to O", meaning: "に反対する" },
  { word: "controversial", meaning: "物議を引き起こす" },
        ];

        const shuffledWordListKey = 'shuffledWordList';
        const missedWordsKey = 'missedWords';
        const resetKey = 'wordReset';

        // 配列シャッフル用関数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 単語リストをローカルストレージに初期化
        if (!localStorage.getItem(resetKey) || localStorage.getItem(resetKey) !== JSON.stringify(initialWordList)) {
            localStorage.setItem(resetKey, JSON.stringify(initialWordList));
            localStorage.setItem(shuffledWordListKey, JSON.stringify(shuffleArray([...initialWordList])));
            localStorage.setItem(missedWordsKey, JSON.stringify([]));
        }

        const wordContainer = document.getElementById('word-container');
        const wordElement = document.getElementById('word');
        const showMeaningBtn = document.getElementById('show-meaning-btn');
        const meaningElement = document.getElementById('meaning');
        const correctBtn = document.getElementById('correct-btn');
        const incorrectBtn = document.getElementById('incorrect-btn');
        const restartBtn = document.getElementById('restart-btn');
        const progressElement = document.getElementById('progress');

        let shuffledWordList = JSON.parse(localStorage.getItem(shuffledWordListKey));
        let missedWords = JSON.parse(localStorage.getItem(missedWordsKey));
        let roundCount = 0;

        function updateLocalStorage() {
            localStorage.setItem(shuffledWordListKey, JSON.stringify(shuffledWordList));
            localStorage.setItem(missedWordsKey, JSON.stringify(missedWords));
        }

        function renderProgress() {
            progressElement.textContent = `${roundCount + 1}ラウンド目: 残り単語数: ${shuffledWordList.length}`;
        }

        function renderWord() {
            if (shuffledWordList.length === 0 && missedWords.length > 0) {
                shuffledWordList = [...missedWords];
                missedWords = [];
                roundCount += 1;
                updateLocalStorage();
                renderProgress();
            }

            if (shuffledWordList.length === 0) {
                wordElement.textContent = "全て完了しました！";
                meaningElement.style.display = "none";
                showMeaningBtn.style.display = "none";
                correctBtn.style.display = "none";
                incorrectBtn.style.display = "none";
                restartBtn.style.display = "inline";
                progressElement.textContent = "";
                return;
            }

            const currentWord = shuffledWordList[0];
            wordElement.textContent = currentWord.word;
            meaningElement.style.display = "none";
            meaningElement.textContent = currentWord.meaning;
            showMeaningBtn.style.display = "inline";
            correctBtn.style.display = "none";
            incorrectBtn.style.display = "none";
        }

        showMeaningBtn.addEventListener('click', () => {
            meaningElement.style.display = "block";
            showMeaningBtn.style.display = "none";
            correctBtn.style.display = "inline";
            incorrectBtn.style.display = "inline";
        });

        correctBtn.addEventListener('click', () => {
            shuffledWordList.shift();
            updateLocalStorage();
            renderWord();
        });

        incorrectBtn.addEventListener('click', () => {
            missedWords.push(shuffledWordList[0]);
            // 3〜5問後に出題されるように間に質問を追加
            const interval = Math.floor(Math.random() * 3) + 3;
            const missedWord = shuffledWordList.shift();
            shuffledWordList.splice(interval, 0, missedWord);
            updateLocalStorage();
            renderWord();
        });

        restartBtn.addEventListener('click', () => {
            localStorage.removeItem(resetKey);
            localStorage.removeItem(shuffledWordListKey);
            localStorage.removeItem(missedWordsKey);
            location.reload();
        });

        renderWord();
        renderProgress();
    </script>
</body>
</html>
