<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>単語帳</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    #word { font-size: 40px; margin: 20px; }
    #meaning { font-size: 24px; margin: 20px; color: #333; }
    button { font-size: 18px; margin: 10px; padding: 10px 20px; }
  </style>
</head>
<body>

  <div id="word"></div>
  <div id="meaning"></div>

  <button id="showBtn">意味を見る</button>

  <div id="resultBtns" style="display:none;">
    <button onclick="answer(true)">できた</button>
    <button onclick="answer(false)">できなかった</button>
  </div>

  <script>
    // =========================
    // 単語リスト（ここに直接追加）
    // =========================
    const words = [
  { word: "be bound to V", meaning: "Vすることになっている" },
  { word: "bet", meaning: "お金などをかける" },
  { word: "demand", meaning: "を要求する" },
  { word: "desire", meaning: "願望" },
  { word: "praise", meaning: "を褒める" },
  { word: "honor", meaning: "名誉" },
  { word: "chat", meaning: "おしゃべりする" },
  { word: "refer to", meaning: "について言及する（参照例として）" },
  { word: "mention", meaning: "について言う" },
  { word: "convey", meaning: "を運ぶ（言葉や感情も含む）" },
  { word: "demonstrate", meaning: "を実演して示す" },
  { word: "emphasize", meaning: "を強調する" },
  { word: "exaggerate", meaning: "のことを大げさに言う" },
  { word: "reply", meaning: "返事をする" },
  { word: "respond", meaning: "返答する" },
  { word: "whisper", meaning: "ささやく" },
  { word: "remark", meaning: "発言する" },
  { word: "observe", meaning: "を観察する" },
  { word: "theory", meaning: "理論" },
  { word: "analysis", meaning: "分析" },
  { word: "phenomenon", meaning: "現象" },
  { word: "device", meaning: "装置" },
  { word: "experiment", meaning: "実験" },
  { word: "chemical", meaning: "化学物質" },
  { word: "fuel", meaning: "燃料" },
  { word: "nuclear", meaning: "原子力の" },
  { word: "statistics", meaning: "統計" },
  { word: "pursue", meaning: "を追求する" },
  { word: "accomplish", meaning: "をやり遂げる" },
  { word: "overcome", meaning: "を克服する" },
  { word: "fulfill", meaning: "を果たす" },
  { word: "devote A to B", meaning: "AをBにささげる" },
  { word: "strive", meaning: "努力する（困難を伴いながら）" },
  { word: "aim", meaning: "狙う" },
  { word: "challenge", meaning: "難問" },
  { word: "trial", meaning: "試み" },
  { word: "dizzy", meaning: "めまいがする" }
      
    ];

    // =========================
    // 状態
    // =========================
    let queue = [];
    let wrongList = [];
    let recentWrong = [];
    let current = null;
    const retryGap = 4;

    // =========================
    // localStorageキー
    // =========================
    const LS_KEY = "wordAppState_v1";

    // =========================
    // 初期化
    // =========================
    function init() {
      const saved = loadState();

      if (saved) {
        queue = saved.queue;
        wrongList = saved.wrongList;
        recentWrong = saved.recentWrong;
        current = saved.current;
      } else {
        resetAll();
      }

      if (!current) next(false);
      render();
    }

    // =========================
    // 次へ
    // =========================
    function next(save = true) {

      if (recentWrong.length >= retryGap) {
        queue.unshift(recentWrong.shift());
      }

      if (queue.length === 0) {
        if (wrongList.length > 0) {
          queue = shuffle([...wrongList]);
          wrongList = [];
        } else {
          resetAll();
          return;
        }
      }

      current = queue.shift();

      if (save) saveState();
      render();
    }

    // =========================
    // 回答
    // =========================
    function answer(correct) {
      if (!correct) {
        wrongList.push(current);
        recentWrong.push(current);
      } else {
        wrongList = wrongList.filter(w => w.word !== current.word);
      }

      saveState();
      next();
    }

    // =========================
    // 表示
    // =========================
    function render() {
      if (!current) return;

      document.getElementById("word").innerText = current.word;
      document.getElementById("meaning").innerText = "";
      document.getElementById("showBtn").style.display = "inline-block";
      document.getElementById("resultBtns").style.display = "none";
    }

    // =========================
    // 意味表示
    // =========================
    document.getElementById("showBtn").onclick = () => {
      document.getElementById("meaning").innerText = current.meaning;
      document.getElementById("showBtn").style.display = "none";
      document.getElementById("resultBtns").style.display = "block";
    };

    // =========================
    // リセット
    // =========================
    function resetAll() {
      queue = shuffle([...words]);
      wrongList = [];
      recentWrong = [];
      current = null;
      saveState();
    }

    // =========================
    // シャッフル
    // =========================
    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    // =========================
    // 保存
    // =========================
    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify({
        queue,
        wrongList,
        recentWrong,
        current
      }));
    }

    // =========================
    // 読み込み
    // =========================
    function loadState() {
      const data = localStorage.getItem(LS_KEY);
      return data ? JSON.parse(data) : null;
    }

    init();
  </script>

</body>
</html>
