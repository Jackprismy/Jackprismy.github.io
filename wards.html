/* =========================
   状態（index管理）
========================= */
let queue = [];
let wrong = [];
let recent = [];
let current = null;

const LS_KEY = "word_srs_final_v1";

/* =========================
   初期化
========================= */
function init() {
  const saved = load();

  if (saved) {
    queue = saved.queue;
    wrong = saved.wrong;
    recent = saved.recent;
    current = saved.current;
  } else {
    reset();
  }

  if (current === null || current === undefined) {
    current = queue.shift();
  }

  save();
  render();
}

/* =========================
   次へ
========================= */
function next() {

  // 2〜4問後に復習
  if (recent.length >= 3) {
    queue.splice(randomPos(), 0, recent.shift());
  }

  // 通常終了 → 間違いリストへ
  if (queue.length === 0) {
    if (wrong.length > 0) {
      queue = shuffle([...wrong]);
      wrong = [];
    } else {
      reset();
    }
  }

  current = queue.shift();

  save();
  render();
}

/* =========================
   回答
========================= */
function answer(correct) {

  if (!correct) {
    wrong.push(current);
    recent.push(current);
  } else {
    wrong = wrong.filter(i => i !== current);
  }

  next();
}

/* =========================
   表示
========================= */
function render() {
  if (current === null || current === undefined) return;

  const w = words[current];

  document.getElementById("word").innerText = w.word;
  document.getElementById("meaning").innerText = "";

  document.getElementById("showBtn").style.display = "block";
  document.getElementById("answerBtns").style.display = "none";
}

/* =========================
   意味表示
========================= */
document.getElementById("showBtn").onclick = () => {
  const w = words[current];

  document.getElementById("meaning").innerText = w.meaning;
  document.getElementById("showBtn").style.display = "none";
  document.getElementById("answerBtns").style.display = "block";
};

/* =========================
   リセット
========================= */
function reset() {
  queue = shuffle([...Array(words.length).keys()]);
  wrong = [];
  recent = [];
  current = null;
}

/* =========================
   ランダム挿入位置（2〜4問後）
========================= */
function randomPos() {
  return Math.min(
    queue.length,
    Math.floor(Math.random() * 3) + 2
  );
}

/* =========================
   シャッフル
========================= */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* =========================
   保存
========================= */
function save() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    queue,
    wrong,
    recent,
    current
  }));
}

/* =========================
   読み込み
========================= */
function load() {
  const data = localStorage.getItem(LS_KEY);
  return data ? JSON.parse(data) : null;
}

init();
