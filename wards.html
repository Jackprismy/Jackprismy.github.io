<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>単語帳 SRS 完全版</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      text-align: center;
    }

    .wrap {
      max-width: 600px;
      margin: auto;
      padding: 30px 15px;
    }

    #word {
      font-size: 44px;
      margin: 40px 0 10px;
      word-break: break-word;
    }

    #meaning {
      font-size: 22px;
      color: #333;
      min-height: 30px;
      margin-bottom: 30px;
    }

    button {
      font-size: 18px;
      padding: 14px 18px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      width: 80%;
      max-width: 300px;
    }

    button:active {
      transform: scale(0.97);
    }

    #answerBtns {
      display: none;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div id="word"></div>
  <div id="meaning"></div>

  <button id="showBtn">意味を見る</button>

  <div id="answerBtns">
    <button onclick="answer(true)">できた</button>
    <button onclick="answer(false)">できなかった</button>
  </div>

</div>

<script>
/* =========================
   単語リスト（固定）
========================= */
const words = [
  { word: "apple", meaning: "りんご" },
  { word: "run", meaning: "走る" },
  { word: "study", meaning: "勉強する" },
  { word: "bear", meaning: "耐える" },
  { word: "prevent", meaning: "防ぐ" },
];

/* =========================
   状態（index管理）
========================= */
let queue = [];
let wrong = [];
let recent = [];
let current = null;

const LS_KEY = "word_srs_final_v1";

/* =========================
   初期化
========================= */
function init() {
  const saved = load();

  if (saved) {
    queue = saved.queue;
    wrong = saved.wrong;
    recent = saved.recent;
    current = saved.current;
  } else {
    reset();
  }

  if (current === null || current === undefined) {
    current = queue.shift();
  }

  save();
  render();
}

/* =========================
   次へ
========================= */
function next() {

  // 2〜4問後に復習
  if (recent.length >= 3) {
    queue.splice(randomPos(), 0, recent.shift());
  }

  // 通常終了 → 間違いリストへ
  if (queue.length === 0) {
    if (wrong.length > 0) {
      queue = shuffle([...wrong]);
      wrong = [];
    } else {
      reset();
    }
  }

  current = queue.shift();

  save();
  render();
}

/* =========================
   回答
========================= */
function answer(correct) {

  if (!correct) {
    wrong.push(current);
    recent.push(current);
  } else {
    wrong = wrong.filter(i => i !== current);
  }

  next();
}

/* =========================
   表示
========================= */
function render() {
  if (current === null || current === undefined) return;

  const w = words[current];

  document.getElementById("word").innerText = w.word;
  document.getElementById("meaning").innerText = "";

  document.getElementById("showBtn").style.display = "block";
  document.getElementById("answerBtns").style.display = "none";
}

/* =========================
   意味表示
========================= */
document.getElementById("showBtn").onclick = () => {
  const w = words[current];

  document.getElementById("meaning").innerText = w.meaning;
  document.getElementById("showBtn").style.display = "none";
  document.getElementById("answerBtns").style.display = "block";
};

/* =========================
   リセット
========================= */
function reset() {
  queue = shuffle([...Array(words.length).keys()]);
  wrong = [];
  recent = [];
  current = null;
}

/* =========================
   ランダム挿入位置（2〜4問後）
========================= */
function randomPos() {
  return Math.min(
    queue.length,
    Math.floor(Math.random() * 3) + 2
  );
}

/* =========================
   シャッフル
========================= */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* =========================
   保存
========================= */
function save() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    queue,
    wrong,
    recent,
    current
  }));
}

/* =========================
   読み込み
========================= */
function load() {
  const data = localStorage.getItem(LS_KEY);
  return data ? JSON.parse(data) : null;
}

init();
</script>

</body>
</html>
